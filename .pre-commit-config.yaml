repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types: [markdown]
  - repo: local
    hooks:
      - id: tropes
        name: tropes (no AI tells)
        entry: bash scripts/check_tropes.sh
        language: system
        types: [markdown]
        pass_filenames: false
